name: CI

on:
  push:
    branches:
      - 'release/**'
      - 'feature/**'
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - 'release/**'
      - main
  workflow_dispatch:
    inputs:
      verbosity:
        description: 'Test output verbosity'
        required: false
        default: 'minimal'
        type: choice
        options:
          - minimal
          - normal
          - detailed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  authentication-unit-tests:
    name: Authentication — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-auth-${{ hashFiles('Authentication/**/*.csproj') }}
          restore-keys: nuget-auth-

      - name: Restore
        run: dotnet restore Authentication/Relativa.Authentication.sln

      - name: Build
        run: dotnet build Authentication/Relativa.Authentication.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Authentication/tests/Relativa.Authentication.Application.Tests --no-build --no-restore --configuration Release --verbosity ${{ inputs.verbosity || 'minimal' }} --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-authentication-unit
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 1


  core-unit-tests:
    name: Core — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-core-unit-${{ hashFiles('Core/**/*.csproj') }}
          restore-keys: nuget-core-unit-

      - name: Restore
        run: dotnet restore Core/Relativa.Core.sln

      - name: Build
        run: dotnet build Core/Relativa.Core.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Core/tests/Relativa.Core.Application.Tests --no-build --no-restore --configuration Release --verbosity ${{ inputs.verbosity || 'minimal' }} --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-core-unit
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 1


  core-integration-tests:
    name: Core — Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-core-integration-${{ hashFiles('Core/**/*.csproj') }}
          restore-keys: nuget-core-integration-

      - name: Restore
        run: dotnet restore Core/tests/Relativa.Core.Integration.Tests/Relativa.Core.Integration.Tests.csproj

      - name: Build
        run: dotnet build Core/tests/Relativa.Core.Integration.Tests/Relativa.Core.Integration.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test Core/tests/Relativa.Core.Integration.Tests/Relativa.Core.Integration.Tests.csproj --no-build --no-restore --configuration Release --verbosity ${{ inputs.verbosity || 'minimal' }} --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-core-integration
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 1


  messaging-tests:
    name: Messaging — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-messaging-${{ hashFiles('Messaging/**/*.csproj') }}
          restore-keys: nuget-messaging-

      - name: Restore
        run: dotnet restore Messaging/tests/Relativa.Messaging.Tests/Relativa.Messaging.Tests.csproj

      - name: Build
        run: dotnet build Messaging/tests/Relativa.Messaging.Tests/Relativa.Messaging.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test Messaging/tests/Relativa.Messaging.Tests/Relativa.Messaging.Tests.csproj --no-build --no-restore --configuration Release --verbosity ${{ inputs.verbosity || 'minimal' }} --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-messaging
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 1


  audit-unit-tests:
    name: Audit — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-audit-unit-${{ hashFiles('Audit/**/*.csproj') }}
          restore-keys: nuget-audit-unit-

      - name: Restore
        run: dotnet restore Audit/Relativa.Audit.sln

      - name: Build
        run: dotnet build Audit/Relativa.Audit.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Audit/tests/Relativa.Audit.Application.Tests --no-build --no-restore --configuration Release --verbosity ${{ inputs.verbosity || 'minimal' }} --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-audit-unit
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 1


  audit-integration-tests:
    name: Audit — Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-audit-${{ hashFiles('Audit/**/*.csproj') }}
          restore-keys: nuget-audit-

      - name: Restore
        run: dotnet restore Audit/tests/Relativa.Audit.Integration.Tests/Relativa.Audit.Integration.Tests.csproj

      - name: Build
        run: dotnet build Audit/tests/Relativa.Audit.Integration.Tests/Relativa.Audit.Integration.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test Audit/tests/Relativa.Audit.Integration.Tests/Relativa.Audit.Integration.Tests.csproj --no-build --no-restore --configuration Release --verbosity ${{ inputs.verbosity || 'minimal' }} --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-audit-integration
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 1


  graph-integration-tests:
    name: Graph — Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-graph-integration-${{ hashFiles('Graph/**/*.csproj') }}
          restore-keys: nuget-graph-integration-

      - name: Restore
        run: dotnet restore Graph/tests/Relativa.Graph.Integration.Tests/Relativa.Graph.Integration.Tests.csproj

      - name: Build
        run: dotnet build Graph/tests/Relativa.Graph.Integration.Tests/Relativa.Graph.Integration.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test Graph/tests/Relativa.Graph.Integration.Tests/Relativa.Graph.Integration.Tests.csproj --no-build --no-restore --configuration Release --verbosity ${{ inputs.verbosity || 'minimal' }} --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-graph-integration
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 1


  coverage-report:
    name: Combined Coverage Report
    runs-on: ubuntu-latest
    needs: [authentication-unit-tests, core-unit-tests, core-integration-tests, messaging-tests, audit-unit-tests, audit-integration-tests, graph-integration-tests]
    if: always()
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache dotnet tools
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: dotnet-tools-reportgenerator-${{ runner.os }}

      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool || dotnet tool update -g dotnet-reportgenerator-globaltool

      - name: Download all coverage XMLs
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-xml-*
          path: ./coverage-xml
          merge-multiple: false

      - name: Generate combined coverage report
        run: |
          reportgenerator \
            -reports:"./coverage-xml/**/coverage.cobertura.xml" \
            -targetdir:"./CoverageReport" \
            -reporttypes:"Html;TextSummary;MarkdownSummaryGithub;JsonSummary" \
            "-assemblyfilters:+Relativa.*" \
            "-classfilters:-*Dto;-*Request;-*Response;-*Endpoints*;-*Program;-*Generated*;-*Options;-*Exception;-*Routing;-*Versions;-*CompilerServices;-*Migrations*;-*EmailSender;-*SmsSender;-*IdentityVerifier"

      - name: Publish coverage summary
        if: always()
        run: |
          cat ./CoverageReport/Summary.txt || true
          cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Enforce per-assembly coverage thresholds
        env:
          MIN_LINE: '80'
          MIN_BRANCH: '80'
        run: |
          python3 - <<'PY'
          import json, os, sys

          min_line = float(os.environ['MIN_LINE'])
          min_branch = float(os.environ['MIN_BRANCH'])

          with open('./CoverageReport/Summary.json', encoding='utf-8-sig') as fh:
              data = json.load(fh)

          assemblies = data['coverage']['assemblies']
          failures = []

          for a in assemblies:
              line = a.get('coverage')
              branch = a.get('branchcoverage')
              if line is not None and line < min_line:
                  failures.append(f"{a['name']}: line {line:.1f}% < {min_line:.0f}%")
              if branch is not None and branch < min_branch:
                  failures.append(f"{a['name']}: branch {branch:.1f}% < {min_branch:.0f}%")

          print(f"Evaluated {len(assemblies)} assemblies against line>={min_line:.0f}% branch>={min_branch:.0f}%")
          if not assemblies:
              print("Coverage gate FAILED: no assemblies in report (partial/failed upstream suites?)")
              sys.exit(1)
          if failures:
              print("Coverage gate FAILED:")
              for f in failures:
                  print("  -", f)
              sys.exit(1)
          print("Coverage gate passed.")
          PY

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 14


  e2e-tests:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          DB_NAME=relativa
          DB_USER=relativa
          DB_PASS=relativa_pass
          DB_PORT=5432
          PGADMIN_DEFAULT_EMAIL=admin@relativa.com
          PGADMIN_DEFAULT_PASSWORD=admin
          PGADMIN_PORT=5050
          JWT_SECRET=super-secret-key-that-should-be-at-least-32-chars!
          JWT_ISSUER=relativa-auth
          JWT_AUDIENCE=relativa
          VITE_GATEWAY_URL=http://localhost:8080
          CLIENT_PORT=3000
          EOF

      - name: Pull base images
        run: |
          for img in \
            mcr.microsoft.com/dotnet/sdk:10.0 \
            mcr.microsoft.com/dotnet/aspnet:10.0 \
            node:20-alpine \
            python:3.11-slim \
            postgres:16-alpine; do
            for i in 1 2 3; do
              docker pull "$img" && break || sleep 15
            done
          done

      - name: Start services
        run: docker compose up -d --build --wait
        timeout-minutes: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('tests/e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tests/e2e
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload E2E HTML report
        id: e2e-html-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: tests/e2e/html-report
          retention-days: 14
          if-no-files-found: error

      - name: Link E2E HTML report in summary
        if: always() && steps.e2e-html-report.outputs.artifact-url != ''
        run: |
          {
            echo "### E2E HTML report"
            echo "Download the **playwright-html-report** artifact, unzip it, and open \`index.html\`."
            echo ""
            echo "[Download report](${{ steps.e2e-html-report.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload E2E screenshots and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tests/e2e/test-results
          retention-days: 14

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-json
          path: tests/e2e/results.json
          retention-days: 14

      - name: Teardown
        if: always()
        run: docker compose down -v


  load-tests:
    name: Load — Performance Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          DB_NAME=relativa
          DB_USER=relativa
          DB_PASS=relativa_pass
          DB_PORT=5432
          PGADMIN_DEFAULT_EMAIL=admin@relativa.com
          PGADMIN_DEFAULT_PASSWORD=admin
          PGADMIN_PORT=5050
          JWT_SECRET=super-secret-key-that-should-be-at-least-32-chars!
          JWT_ISSUER=relativa-auth
          JWT_AUDIENCE=relativa
          VITE_GATEWAY_URL=http://localhost:8080
          CLIENT_PORT=3000
          EOF

      - name: Start services
        run: docker compose up -d --build --wait
        timeout-minutes: 10

      - name: Run load tests
        env:
          LOAD_RATE: '20'
          LOAD_DURATION_SEC: '20'
          LOAD_P95_MS: '1500'
          LOAD_MAX_FAIL_RATE: '0.05'
        run: dotnet run --project LoadTests/Relativa.LoadTests/Relativa.LoadTests.csproj -c Release

      - name: Upload load test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: |
            LoadTests/Relativa.LoadTests/load-reports
            load-reports
          retention-days: 14

      - name: Teardown
        if: always()
        run: docker compose down -v
