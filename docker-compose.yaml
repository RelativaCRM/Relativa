services:
  postgres:
    image: postgres:16-alpine
    container_name: relativa-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - relativa_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: relativa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-relativa}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-relativa}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - relativa_net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: relativa-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - relativa_net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: relativa-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - relativa_net

  auth:
    build:
      context: .
      dockerfile: Authentication/Dockerfile
    container_name: relativa-auth
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8081
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}
      Jwt__SecretKey: "${JWT_SECRET:-super-secret-key-that-should-be-at-least-32-chars!}"
      Jwt__Issuer: "${JWT_ISSUER:-relativa-auth}"
      Jwt__Audience: "${JWT_AUDIENCE:-relativa}"
      RabbitMqAudit__Host: rabbitmq
      RabbitMqAudit__Port: 5672
      RabbitMqAudit__Username: "${RABBITMQ_USER:-relativa}"
      RabbitMqAudit__Password: "${RABBITMQ_PASS:-relativa}"
      RabbitMqAudit__Exchange: audit.events
      RabbitMqAudit__DomainExchange: relativa.domain
      Smtp__Host: "${SMTP_HOST:-mailhog}"
      Smtp__Port: "${SMTP_PORT:-1025}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromAddress: "${SMTP_FROM_ADDRESS:-noreply@relativa.com}"
      Smtp__FromName: "${SMTP_FROM_NAME:-Relativa}"
      Smtp__UseSsl: "${SMTP_USE_SSL:-false}"
      App__FrontendBaseUrl: "${APP_FRONTEND_BASE_URL:-http://localhost:3000}"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - relativa_net

  core:
    build:
      context: .
      dockerfile: Core/Dockerfile
    container_name: relativa-core
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8082
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}
      RabbitMqAudit__Host: rabbitmq
      RabbitMqAudit__Port: 5672
      RabbitMqAudit__Username: "${RABBITMQ_USER:-relativa}"
      RabbitMqAudit__Password: "${RABBITMQ_PASS:-relativa}"
      RabbitMqAudit__Exchange: audit.events
      RabbitMqAudit__DomainExchange: relativa.domain
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8082' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - relativa_net

  graph:
    build:
      context: .
      dockerfile: Graph/Dockerfile
    container_name: relativa-graph
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8083
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}
      RabbitMqGraph__Host: rabbitmq
      RabbitMqGraph__Port: 5672
      RabbitMqGraph__Username: "${RABBITMQ_USER:-relativa}"
      RabbitMqGraph__Password: "${RABBITMQ_PASS:-relativa}"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - relativa_net

  ml:
    build:
      context: ./ML
      dockerfile: Dockerfile
    container_name: relativa-ml
    environment:
      DJANGO_SETTINGS_MODULE: relativa_ml.settings
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: "${RABBITMQ_USER:-relativa}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASS:-relativa}"
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - relativa_net

  audit:
    build:
      context: .
      dockerfile: Audit/Dockerfile
    container_name: relativa-audit
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8086
      Jwt__SecretKey: "${JWT_SECRET:-super-secret-key-that-should-be-at-least-32-chars!}"
      Jwt__Issuer: "${JWT_ISSUER:-relativa-auth}"
      Jwt__Audience: "${JWT_AUDIENCE:-relativa}"
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}
      RabbitMqAudit__Host: rabbitmq
      RabbitMqAudit__Port: 5672
      RabbitMqAudit__Username: "${RABBITMQ_USER:-relativa}"
      RabbitMqAudit__Password: "${RABBITMQ_PASS:-relativa}"
      RabbitMqAudit__Exchange: audit.events
      RabbitMqAudit__Queue: audit.events.audit
      RabbitMqAudit__RoutingKey: audit.#
    ports:
      - "8086:8086"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - relativa_net

  gateway:
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    container_name: relativa-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Jwt__SecretKey: "${JWT_SECRET:-super-secret-key-that-should-be-at-least-32-chars!}"
      Jwt__Issuer: "${JWT_ISSUER:-relativa-auth}"
      Jwt__Audience: "${JWT_AUDIENCE:-relativa}"
      Cors__Origins__0: "${CORS_ORIGIN_1:-http://localhost:5173}"
      Cors__Origins__1: "${CORS_ORIGIN_2:-http://localhost:3000}"
      Cors__AllowAnyOriginForDev: "${CORS_ALLOW_ANY_ORIGIN_FOR_DEV:-false}"
      ReverseProxy__Clusters__auth__Destinations__d1__Address: http://auth:8081/
      ReverseProxy__Clusters__core__Destinations__d1__Address: http://core:8082/
      ReverseProxy__Clusters__graph__Destinations__d1__Address: http://graph:8083/
      ReverseProxy__Clusters__ml__Destinations__d1__Address: http://ml:8084/
      ReverseProxy__Clusters__audit__Destinations__d1__Address: http://audit:8086/
    ports:
      - "8080:8080"
    depends_on:
      auth:
        condition: service_healthy
      core:
        condition: service_healthy
      graph:
        condition: service_started
      ml:
        condition: service_started
      audit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - relativa_net

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: relativa-client
    environment:
      VITE_GATEWAY_URL: ${VITE_GATEWAY_URL}
    ports:
      - "${CLIENT_PORT}:3000"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    networks:
      - relativa_net

  migration:
    build:
      context: .
      dockerfile: Migration/Dockerfile
    container_name: relativa-migration
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      MIGRATION_TRUNCATE_DB: "${MIGRATION_TRUNCATE_DB:-false}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - relativa_net
    develop:
      watch:
        - action: rebuild
          path: ./Migration

networks:
  relativa_net:
    driver: bridge

volumes:
  postgres_data:


